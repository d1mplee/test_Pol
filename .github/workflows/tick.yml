# Paper-трейдинг тик: расчёт созревших позиций + новые входы H2.
# Журнал data/paper_positions.csv коммитится обратно — публичный
# верифицируемый трек-рекорд (таймстампы коммитов GitHub).
name: paper-tick

on:
  schedule:
    - cron: "*/30 * * * *"   # каждые 30 минут (GitHub может задерживать на 5-15 мин)
  workflow_dispatch: {}       # ручной запуск для отладки

concurrency:
  group: journal-writes       # тик и h5-вахта не должны пушить одновременно
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install requests pandas numpy

      - name: paper tick
        run: python -u -X utf8 -m paper.run tick

      - name: commit journal
        run: |
          git config user.name "paper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f data/paper_positions.csv
          git diff --cached --quiet && echo "нет изменений" && exit 0
          git commit -m "tick: $(date -u +'%Y-%m-%d %H:%MZ')"
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push #$i отклонён, подтягиваю и повторяю"
            git fetch origin main
            git rebase --autostash origin/main || { git rebase --abort; exit 1; }
            sleep $((5 * i))
          done
          git push
